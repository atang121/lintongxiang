<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
  </defs>
  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)" rx="0"/>
  <!-- 顶部装饰圆 -->
  <circle cx="150" cy="100" r="80" fill="white" opacity="0.08"/>
  <circle cx="1050" cy="550" r="100" fill="white" opacity="0.08"/>
  <!-- 主标题 -->
  <text x="600" y="260" text-anchor="middle" font-size="100" font-weight="bold" fill="white" font-family="sans-serif">童邻市集</text>
  <!-- 副标题 -->
  <text x="600" y="340" text-anchor="middle" font-size="36" fill="rgba(255,255,255,0.85)" font-family="sans-serif">襄阳儿童闲置物品交换平台</text>
  <!-- 三个图标 -->
  <g transform="translate(280, 430)">
    <circle cx="30" cy="30" r="30" fill="rgba(255,255,255,0.15)"/>
    <text x="30" y="42" text-anchor="middle" font-size="28">🎁</text>
    <text x="30" y="75" text-anchor="middle" font-size="18" fill="white" font-family="sans-serif">免费赠送</text>
  </g>
  <g transform="translate(540, 430)">
    <circle cx="30" cy="30" r="30" fill="rgba(255,255,255,0.15)"/>
    <text x="30" y="42" text-anchor="middle" font-size="28">🔄</text>
    <text x="30" y="75" text-anchor="middle" font-size="18" fill="white" font-family="sans-serif">以物换物</text>
  </g>
  <g transform="translate(800, 430)">
    <circle cx="30" cy="30" r="30" fill="rgba(255,255,255,0.15)"/>
    <text x="30" y="42" text-anchor="middle" font-size="28">♻️</text>
    <text x="30" y="75" text-anchor="middle" font-size="18" fill="white" font-family="sans-serif">低碳环保</text>
  </g>
  <!-- 底部标语 -->
  <text x="600" y="580" text-anchor="middle" font-size="20" fill="rgba(255,255,255,0.6)" font-family="sans-serif">让闲置流转出邻里温度</text>
</svg>
