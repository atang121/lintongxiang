# ============================================================
# 邻里童享 - Nginx 反向代理配置
# 把这个文件放到 /etc/nginx/sites-available/lintongxiang
# 然后: sudo ln -s /etc/nginx/sites-available/lintongxiang /etc/nginx/sites-enabled/
# ============================================================

server {
    listen 80;
    server_name 你的域名;  # 例如: api.example.com 或者直接用 IP

    # --- 后端 API (Express 3001) ---
    location /api {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # --- 用户上传的图片（本地存储 fallback）---
    location /uploads {
        alias /var/www/lintongxiang/server/data/uploads;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # --- 健康检查 ---
    location /health {
        proxy_pass http://127.0.0.1:3001;
        access_log off;
    }
}

